<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application form</title>
</head>
<body>        
    <h2>Register</h2>
    <form>
            <label for="firstname">First Name:</label>
            <input type="text" name="firstname" placeholder="Enter your First Name" required><br><hr>
            <label for="lastname">Last Name:</label>
            <input type="text" name="lastname" placeholder="Enter your Last Name" required><br><hr>
            <label for="surname">Surname:</label>
            <input type="text" name="surname" placeholder="Enter your Surname" required><br><hr>
            <label for="username">UserName:</label>
            <input type="text" name="username" placeholder="Enter your username" required><br><hr>
            <label>Date of Birth</label>
            <input type="date"><br><hr>
            <label>Gender</label>
            <input type="radio">
            <input type="radio">
            <input type="radio"><hr>
            <input type="checkbox">
            <input type="checkbox">
            <input type="checkbox">
            <input type="checkbox">
            <input type="checkbox"><hr>
            <input type="tel"><hr>
            <input type="text"><hr>
            <input type="email" placeholder="Enter your email" required><hr>
            <input type="password" placeholder="Create a password" required><hr>
            <input type="password" placeholder="Confirm your password" required><hr>
            <input type="image" src="" alt=""><hr>
            <input type="file"><hr>
            <button type="submit">Register</button>
    </form>
</body>
</html>
